version: '3.8'

services:
  app:
    image: todo-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    labels:
      traefik.enable: "true"
      traefik.docker.network: dokploy-network
      traefik.http.routers.tasks-web.rule: "Host(`tasks.cessmedia.com`)"
      traefik.http.routers.tasks-web.entrypoints: "web"
      traefik.http.routers.tasks-web.middlewares: "redirect-to-https@file"
      traefik.http.routers.tasks-web.service: "tasks-service"
      traefik.http.routers.tasks-secure.rule: "Host(`tasks.cessmedia.com`)"
      traefik.http.routers.tasks-secure.entrypoints: "websecure"
      traefik.http.routers.tasks-secure.tls.certresolver: "letsencrypt"
      traefik.http.routers.tasks-secure.service: "tasks-service"
      traefik.http.services.tasks-service.loadbalancer.server.port: "3000"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
