<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      font-size: 2em;
    }
    .logout-btn {
      background: rgba(255,255,255,0.3);
      border: 1px solid white;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9em;
    }
    .logout-btn:hover {
      background: rgba(255,255,255,0.5);
    }
    .content {
      padding: 30px;
    }
    .auth-form {
      display: none;
    }
    .auth-form.active {
      display: block;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      color: #333;
      font-weight: 500;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1em;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
    }
    .auth-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .auth-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    .submit-btn {
      background: #667eea;
      color: white;
    }
    .submit-btn:hover {
      background: #764ba2;
    }
    .toggle-btn {
      background: #f0f0f0;
      color: #666;
    }
    .toggle-btn:hover {
      background: #e0e0e0;
    }
    .todos-section {
      display: none;
    }
    .todos-section.active {
      display: block;
    }
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }
    input[type="text"].todo-input {
      flex: 1;
    }
    button {
      padding: 12px 30px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #764ba2;
    }
    .todos {
      list-style: none;
    }
    .todo-item {
      display: flex;
      align-items: center;
      padding: 15px;
      border-bottom: 1px solid #f0f0f0;
      gap: 12px;
    }
    .todo-item:hover {
      background: #f9f9f9;
    }
    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #999;
    }
    .todo-checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    .todo-text {
      flex: 1;
      font-size: 1em;
    }
    .delete-btn {
      background: #ef4444;
      padding: 6px 12px;
      font-size: 0.9em;
    }
    .delete-btn:hover {
      background: #dc2626;
    }
    .empty {
      text-align: center;
      color: #999;
      padding: 40px 20px;
    }
    .error {
      background: #fee2e2;
      color: #dc2626;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header" id="header">
      <h1>📝 My Tasks</h1>
      <button class="logout-btn" id="logoutBtn" style="display: none;">Logout</button>
    </div>

    <div class="content">
      <!-- Auth Forms -->
      <div id="authSection">
        <div class="error" id="authError" style="display: none;"></div>

        <div class="auth-form active" id="loginForm">
          <h2>Login</h2>
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="loginUsername" placeholder="Enter username">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter password">
          </div>
          <div class="auth-buttons">
            <button class="submit-btn" onclick="login()">Login</button>
            <button class="toggle-btn" onclick="toggleAuth()">Create Account</button>
          </div>
        </div>

        <div class="auth-form" id="registerForm">
          <h2>Create Account</h2>
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="registerUsername" placeholder="Choose a username">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="registerPassword" placeholder="At least 6 characters">
          </div>
          <div class="auth-buttons">
            <button class="submit-btn" onclick="register()">Sign Up</button>
            <button class="toggle-btn" onclick="toggleAuth()">Back to Login</button>
          </div>
        </div>
      </div>

      <!-- Todos Section -->
      <div id="todosSection" class="todos-section">
        <div class="input-group">
          <input type="text" id="input" class="todo-input" placeholder="Add a new task..." />
          <button onclick="addTodo()">Add</button>
        </div>
        <ul class="todos" id="todos"></ul>
        <div class="empty" id="empty" style="display: none;">No tasks yet. Add one to get started!</div>
      </div>
    </div>
  </div>

  <script>
    let token = localStorage.getItem('token');

    function toggleAuth() {
      document.getElementById('loginForm').classList.toggle('active');
      document.getElementById('registerForm').classList.toggle('active');
      clearAuthError();
    }

    function showAuthError(msg) {
      const errorEl = document.getElementById('authError');
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }

    function clearAuthError() {
      document.getElementById('authError').style.display = 'none';
    }

    async function login() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!username || !password) {
        showAuthError('Please enter username and password');
        return;
      }

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (!res.ok) {
        showAuthError(data.error || 'Login failed');
        return;
      }

      token = data.token;
      localStorage.setItem('token', token);
      showTodosSection();
      loadTodos();
    }

    async function register() {
      const username = document.getElementById('registerUsername').value.trim();
      const password = document.getElementById('registerPassword').value;

      if (!username || !password) {
        showAuthError('Please enter username and password');
        return;
      }

      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (!res.ok) {
        showAuthError(data.error || 'Registration failed');
        return;
      }

      token = data.token;
      localStorage.setItem('token', token);
      showTodosSection();
      loadTodos();
    }

    function logout() {
      token = null;
      localStorage.removeItem('token');
      document.getElementById('loginUsername').value = '';
      document.getElementById('loginPassword').value = '';
      document.getElementById('registerUsername').value = '';
      document.getElementById('registerPassword').value = '';
      showAuthSection();
    }

    function showAuthSection() {
      document.getElementById('authSection').style.display = 'block';
      document.getElementById('todosSection').classList.remove('active');
      document.getElementById('logoutBtn').style.display = 'none';
    }

    function showTodosSection() {
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('todosSection').classList.add('active');
      document.getElementById('logoutBtn').style.display = 'block';
    }

    async function loadTodos() {
      if (!token) return;

      const res = await fetch('/api/todos', {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!res.ok) {
        logout();
        return;
      }

      const todos = await res.json();
      const list = document.getElementById('todos');
      const empty = document.getElementById('empty');

      list.innerHTML = '';
      if (todos.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      todos.forEach(todo => {
        const li = document.createElement('li');
        li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
        li.innerHTML = `
          <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''}
            onchange="toggleTodo(${todo.id})" />
          <span class="todo-text">${escapeHtml(todo.title)}</span>
          <button class="delete-btn" onclick="deleteTodo(${todo.id})">Delete</button>
        `;
        list.appendChild(li);
      });
    }

    async function addTodo() {
      const input = document.getElementById('input');
      const title = input.value.trim();
      if (!title) return;

      const res = await fetch('/api/todos', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ title })
      });

      if (!res.ok) {
        logout();
        return;
      }

      input.value = '';
      loadTodos();
    }

    async function toggleTodo(id) {
      await fetch(`/api/todos/${id}`, {
        method: 'PATCH',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      loadTodos();
    }

    async function deleteTodo(id) {
      await fetch(`/api/todos/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      loadTodos();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById('input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTodo();
    });

    document.getElementById('logoutBtn').addEventListener('click', logout);

    // Initialize
    if (token) {
      showTodosSection();
      loadTodos();
    } else {
      showAuthSection();
    }
  </script>
</body>
</html>
