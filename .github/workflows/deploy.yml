name: Build & Deploy to Dokploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Deploy to Dokploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DOKPLOY_HOST }}
          username: ${{ secrets.DOKPLOY_USER }}
          key: ${{ secrets.DOKPLOY_SSH_KEY }}
          script: |
            dokploy-deploy ${{ secrets.DOKPLOY_APP_NAME }} \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              ${{ github.actor }} \
              ${{ secrets.GITHUB_TOKEN }}

      - name: Verify deployment
        run: |
          echo "✓ Image built: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "✓ Deployment triggered on ${{ secrets.DOKPLOY_HOST }}"
          echo "✓ Check deployment at: https://tasks.cessmedia.com"
